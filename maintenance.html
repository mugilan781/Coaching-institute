<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Excel Academy is currently under maintenance. We'll be back shortly.">
  <title>Under Maintenance | Excel Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .maintenance-countdown {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 32px;
    }
    .countdown-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 20px 28px;
      min-width: 90px;
      box-shadow: var(--shadow-md);
    }
    .countdown-item .countdown-number {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 2.2rem;
      color: var(--navy);
      line-height: 1;
    }
    .countdown-item .countdown-label {
      font-size: 0.78rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 6px;
      font-weight: 600;
    }
    .countdown-separator {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 2.2rem;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      padding-top: 4px;
    }
    @media (max-width: 576px) {
      .maintenance-countdown {
        gap: 8px;
        margin-bottom: 24px;
      }
      .countdown-item {
        padding: 12px 14px;
        min-width: 70px;
        border-radius: var(--radius-md);
      }
      .countdown-item .countdown-number {
        font-size: 1.6rem;
      }
      .countdown-item .countdown-label {
        font-size: 0.62rem;
        letter-spacing: 0.5px;
        margin-top: 4px;
      }
      .countdown-separator {
        font-size: 1.6rem;
        padding-top: 2px;
      }
    }
    @media (max-width: 480px) {
      .maintenance-page {
        padding: 60px 16px 30px !important;
      }
    }
  </style>
</head>
<body>

  <section class="maintenance-page" style="min-height: 100vh; padding: 80px 24px 40px; display: flex; align-items: center; justify-content: center; box-sizing: border-box;">
    <div class="reveal-scale" style="max-width: 650px;">
      <div class="maintenance-icon">
        <svg viewBox="0 0 24 24" width="80" height="80" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </div>
      <h2>Under Maintenance</h2>
      <p>We are currently performing scheduled upgrades to improve your learning experience. Our platform will be back online shortly. Thank you for your patience!</p>
      <div class="maintenance-countdown">
        <div class="countdown-item">
          <span class="countdown-number">02</span>
          <span class="countdown-label">Hours</span>
        </div>
        <span class="countdown-separator">:</span>
        <div class="countdown-item">
          <span class="countdown-number">14</span>
          <span class="countdown-label">Minutes</span>
        </div>
        <span class="countdown-separator">:</span>
        <div class="countdown-item">
          <span class="countdown-number">36</span>
          <span class="countdown-label">Seconds</span>
        </div>
      </div>
      <div class="flex-center gap-16" style="flex-wrap: wrap;">
        <button class="btn btn-primary btn-lg"><i class="fa-solid fa-bell"></i> Notify Me</button>
        <a href="index.html" class="btn btn-outline btn-lg"><i class="fa-solid fa-house"></i> Back to Home</a>
      </div>
      <div style="margin-top: 40px;">
        <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 16px;">Follow us for updates</p>
        <div class="flex-center gap-12" style="flex-wrap: wrap;">
          <a href="#" class="btn btn-icon btn-ghost" style="width: 48px; height: 48px; font-size: 1.3rem;"><i class="fa-brands fa-facebook-f"></i></a>
          <a href="#" class="btn btn-icon btn-ghost" style="width: 48px; height: 48px; font-size: 1.3rem;"><i class="fa-brands fa-instagram"></i></a>
          <a href="#" class="btn btn-icon btn-ghost" style="width: 48px; height: 48px; font-size: 1.3rem;"><i class="fa-brands fa-x-twitter"></i></a>
          <a href="#" class="btn btn-icon btn-ghost" style="width: 48px; height: 48px; font-size: 1.3rem;"><i class="fa-brands fa-linkedin-in"></i></a>
          <a href="#" class="btn btn-icon btn-ghost" style="width: 48px; height: 48px; font-size: 1.3rem;"><i class="fa-brands fa-telegram"></i></a>
        </div>
      </div>
    </div>
  </section>

  <script src="assets/js/main.js"></script>
</body>
</html>
