<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to your Excel Academy student portal to access courses, study materials, and student dashboard.">
  <title>Login | Excel Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <!-- Minimal Auth Navbar -->
  <nav class="nav auth-nav" role="navigation" aria-label="Authentication navigation">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo" aria-label="Excel Academy Home">
        <span class="nav-logo-icon">
          <img src="assets/images/logo1.png" alt="Excel Academy Logo">
        </span>
        Excel Academy
      </a>
      <div class="nav-actions">
        <button class="theme-toggle" aria-label="Toggle theme">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button class="rtl-toggle" aria-label="Toggle RTL">RTL</button>
      </div>
    </div>
  </nav>

  <!-- Main Auth Container -->
  <main class="auth-wrapper">
    <div class="auth-card reveal-scale">
      
      <!-- Card Header -->
      <div class="auth-card-header">
        <span class="auth-badge">
          <i class="fa-solid fa-graduation-cap"></i> Student Portal
        </span>
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Sign in to access your courses, study materials, mock tests and student dashboard.</p>
      </div>

      <!-- Social Login Buttons -->
      <div class="auth-social-group">
        <button type="button" class="social-btn" onclick="window.location.href='https://google.com'" aria-label="Sign in with Google">
          <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path fill="#4285F4" d="M23.745 12.27c0-.7-.06-1.4-.19-2.07H12v4.51h6.6c-.29 1.52-1.14 2.82-2.4 3.68v3.05h3.88c2.27-2.09 3.665-5.17 3.665-9.17z"/>
            <path fill="#34A853" d="M12 24c3.24 0 5.95-1.08 7.93-2.91l-3.88-3.05c-1.08.72-2.45 1.16-4.05 1.16-3.1 0-5.74-2.09-6.68-4.91H1.28v3.14C3.25 21.32 7.31 24 12 24z"/>
            <path fill="#FBBC05" d="M5.32 14.29c-.24-.72-.38-1.49-.38-2.29s.14-1.57.38-2.29V6.57H1.28C.46 8.2 0 10.04 0 12s.46 3.8 1.28 5.43l4.04-3.14z"/>
            <path fill="#EA4335" d="M12 4.75c1.77 0 3.35.61 4.6 1.8l3.42-3.42C17.95 1.19 15.24 0 12 0 7.31 0 3.25 2.68 1.28 6.57l4.04 3.14c.94-2.82 3.58-4.96 6.68-4.96z"/>
          </svg>
          Google
        </button>
        <button type="button" class="social-btn" onclick="window.location.href='https://apple.com'" aria-label="Sign in with Apple">
          <i class="fa-brands fa-apple" style="font-size: 20px;"></i>
          Apple
        </button>
      </div>

      <!-- Divider -->
      <div class="auth-divider">
        <span>OR CONTINUE WITH EMAIL</span>
      </div>

      <!-- Form -->
      <form id="login-form" class="auth-form" novalidate>
        
        <!-- Email Field -->
        <div class="form-group">
          <label for="login-email" class="input-label">Email Address *</label>
          <div class="input-wrapper">
            <i class="fa-regular fa-envelope input-icon"></i>
            <input type="email" id="login-email" class="auth-input" placeholder="student@example.com" required autocomplete="email">
          </div>
          <div id="email-feedback" class="field-feedback" style="display: none;"></div>
        </div>

        <!-- Password Field -->
        <div class="form-group">
          <label for="login-password" class="input-label">Password *</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-lock input-icon"></i>
            <input type="password" id="login-password" class="auth-input has-toggle" placeholder="Enter your password" required autocomplete="current-password">
            <button type="button" class="input-toggle-btn" id="toggle-login-password" aria-label="Toggle password visibility">
              <i class="fa-regular fa-eye"></i>
            </button>
          </div>
          <div id="password-feedback" class="field-feedback" style="display: none;"></div>
        </div>

        <!-- Remember Me & Forgot Password -->
        <div class="flex-between" style="align-items: center; margin-top: -4px;">
          <label class="checkbox-group" style="display: flex; align-items: center; gap: 8px; font-size: 0.88rem; cursor: pointer; color: var(--text-secondary);">
            <input type="checkbox" id="remember-me" checked style="accent-color: var(--navy); width: 16px; height: 16px;">
            Remember Me
          </label>
          <a href="#" id="forgot-password-link" class="auth-link" style="font-size: 0.88rem;">Forgot Password?</a>
        </div>

        <!-- Submit Button -->
        <button type="submit" id="login-submit-btn" class="btn btn-primary btn-auth-submit w-full">
          <span>SIGN IN</span>
          <i class="fa-solid fa-arrow-right"></i>
        </button>

      </form>

      <!-- Card Footer -->
      <div class="auth-card-footer">
        <p class="auth-switch-text">
          Don't have an account? <a href="signup.html" class="auth-link">Create Account</a>
        </p>
        <a href="index.html" class="back-home-link">
          <i class="fa-solid fa-arrow-left"></i> Back to Home
        </a>
      </div>

    </div>
  </main>

  <script src="assets/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Password visibility toggle
      const pwdInput = document.getElementById('login-password');
      const pwdToggleBtn = document.getElementById('toggle-login-password');
      
      if (pwdInput && pwdToggleBtn) {
        pwdToggleBtn.addEventListener('click', () => {
          const isPassword = pwdInput.getAttribute('type') === 'password';
          pwdInput.setAttribute('type', isPassword ? 'text' : 'password');
          pwdToggleBtn.innerHTML = isPassword 
            ? '<i class="fa-regular fa-eye-slash"></i>' 
            : '<i class="fa-regular fa-eye"></i>';
        });
      }

      // Login form validation & submission
      const loginForm = document.getElementById('login-form');
      const emailInput = document.getElementById('login-email');
      const emailFeedback = document.getElementById('email-feedback');
      const passwordFeedback = document.getElementById('password-feedback');
      const submitBtn = document.getElementById('login-submit-btn');

      const validateEmail = (email) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);

      emailInput.addEventListener('input', () => {
        if (emailInput.value.trim() === '') {
          emailInput.classList.remove('valid', 'invalid');
          emailFeedback.style.display = 'none';
        } else if (validateEmail(emailInput.value.trim())) {
          emailInput.classList.add('valid');
          emailInput.classList.remove('invalid');
          emailFeedback.className = 'field-feedback success';
          emailFeedback.innerHTML = '<i class="fa-solid fa-circle-check"></i> Valid email address';
          emailFeedback.style.display = 'flex';
        } else {
          emailInput.classList.add('invalid');
          emailInput.classList.remove('valid');
          emailFeedback.className = 'field-feedback error';
          emailFeedback.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> Please enter a valid email address';
          emailFeedback.style.display = 'flex';
        }
      });

      pwdInput.addEventListener('input', () => {
        if (pwdInput.value !== '') {
          pwdInput.classList.add('valid');
          pwdInput.classList.remove('invalid');
          passwordFeedback.style.display = 'none';
        }
      });

      loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        let isValid = true;

        if (!validateEmail(emailInput.value.trim())) {
          emailInput.classList.add('invalid');
          emailFeedback.className = 'field-feedback error';
          emailFeedback.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> Please enter a valid email address';
          emailFeedback.style.display = 'flex';
          isValid = false;
        }

        if (pwdInput.value === '') {
          pwdInput.classList.add('invalid');
          passwordFeedback.className = 'field-feedback error';
          passwordFeedback.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> Please enter your password';
          passwordFeedback.style.display = 'flex';
          isValid = false;
        }

        if (isValid) {
          submitBtn.disabled = true;
          submitBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Signing In...';
          
          setTimeout(() => {
            window.location.href = 'dashboard-student.html';
          }, 1200);
        }
      });

      // Forgot Password trigger
      const forgotLink = document.getElementById('forgot-password-link');
      if (forgotLink) {
        forgotLink.addEventListener('click', (e) => {
          e.preventDefault();
          const emailVal = emailInput.value.trim();
          if (emailVal && validateEmail(emailVal)) {
            alert(`Password reset link has been sent to ${emailVal}`);
          } else {
            alert('Please enter a valid email address first to reset your password.');
            emailInput.focus();
          }
        });
      }
    });
  </script>
</body>
</html>
